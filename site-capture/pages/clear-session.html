<!doctype html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <link rel="apple-touch-icon" sizes="76x76" href="/static/assets/img/apple-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/static/assets/img/favicon.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Yönetim Paneli - Giriş</title>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
    <meta name="viewport" content="width=device-width" />
    <link href="/static/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/static/assets/css/animate.min.css" rel="stylesheet" />
    <link href="/static/assets/css/paper-dashboard.css" rel="stylesheet" />
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/latest/css/font-awesome.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Muli:400,300' rel='stylesheet' type='text/css'>
    <link href="/static/assets/css/themify-icons.css" rel="stylesheet">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f3ef;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            margin: 0 15px;
        }
    </style>
</head>

<body>
    <div class="login-wrapper" x-data="{ username: '', password: '', loading: false, error: '' }">
        <div class="login-card">
            <div class="card">
                <div class="content">
                    <div class="text-center mb-4">
                        <h3 style="color: #7A9E9F;">Yönetim Paneli</h3>
                    </div>
                                        <form @submit.prevent="handleLogin" action="/jehat/login" method="POST" x-ref="form">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Kullanıcı Adı</label>
                                    <input type="text" class="form-control border-input" name="username" x-model="username" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Şifre</label>
                                    <input type="password" class="form-control border-input" name="password" x-model="password" required>
                                </div>
                            </div>
                        </div>
                        <template x-if="error">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="alert alert-danger" x-text="error"></div>
                                </div>
                            </div>
                        </template>
                        <div class="row">
                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary btn-block" :disabled="loading">
                                    <span x-show="!loading" style="display: none;">Giriş Yap</span>
                                    <span x-show="loading" style="display: none;">Giriş Yapılıyor...</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/assets/js/jquery-1.10.2.js" type="text/javascript"></script>
    <script src="/static/assets/js/bootstrap.min.js" type="text/javascript"></script>
    <script src="/static/js/cdn.min.js" defer></script>
    <script>
        function handleLogin() {
            this.loading = true;
            this.error = '';
            this.$refs.form.submit();
        }
    </script>
</body>

</html>
