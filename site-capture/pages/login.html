<!doctype html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <link rel="apple-touch-icon" sizes="76x76" href="/static/assets/img/apple-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/static/assets/img/favicon.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Yönetim Paneli - Giriş</title>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
    <meta name="viewport" content="width=device-width" />
    <link href="/static/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/static/assets/css/animate.min.css" rel="stylesheet" />
    <link href="/static/assets/css/paper-dashboard.css" rel="stylesheet" />
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/latest/css/font-awesome.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Muli:400,300' rel='stylesheet' type='text/css'>
    <link href="/static/assets/css/themify-icons.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0099cc 0%, #006699 100%);
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #0099cc 0%, #006699 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-card .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .login-card .content {
            padding: 30px 20px;
        }

        .login-card .text-center {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-card h3 {
            color: #0099cc !important;
            font-size: 28px;
            font-weight: 600;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-control {
            width: 100% !important;
            padding: 12px 15px !important;
            border: 1px solid #ddd !important;
            border-radius: 4px !important;
            font-size: 14px !important;
            background-color: #f9f9f9 !important;
            color: #333 !important;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none !important;
            border-color: #0099cc !important;
            background-color: white !important;
            box-shadow: 0 0 0 3px rgba(0, 153, 204, 0.1) !important;
        }

        .btn-primary {
            width: 100% !important;
            padding: 12px !important;
            background-color: #ffc107 !important;
            border: none !important;
            border-radius: 4px !important;
            color: #000 !important;
            font-weight: 600 !important;
            font-size: 16px !important;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #ffb300 !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px 15px !important;
            margin-bottom: 15px !important;
            border-radius: 4px !important;
            font-size: 14px !important;
        }

        .alert-danger {
            background-color: #f8d7da !important;
            border: 1px solid #f5c6cb !important;
            color: #721c24 !important;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            margin: 0;
        }

        .col-md-12 {
            width: 100%;
            padding: 0;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .login-card {
                padding: 10px;
            }

            .login-card .content {
                padding: 20px 15px;
            }

            .login-card h3 {
                font-size: 24px;
            }

            .form-control {
                font-size: 16px !important;
                padding: 14px 12px !important;
            }

            .btn-primary {
                font-size: 16px !important;
                padding: 14px !important;
            }
        }

        @media (max-width: 480px) {
            .login-wrapper {
                padding: 15px;
            }

            .login-card {
                padding: 5px;
            }

            .login-card .content {
                padding: 15px 12px;
            }

            .login-card h3 {
                font-size: 20px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-group label {
                font-size: 13px;
            }

            .form-control {
                font-size: 16px !important;
                padding: 12px 10px !important;
            }

            .btn-primary {
                font-size: 15px !important;
                padding: 12px !important;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .login-card .card {
                background: #1e1e1e;
            }

            .login-card h3 {
                color: #4db8ff !important;
            }

            .form-group label {
                color: #e0e0e0;
            }

            .form-control {
                background-color: #2a2a2a !important;
                color: #e0e0e0 !important;
                border-color: #444 !important;
            }

            .form-control:focus {
                background-color: #333 !important;
                border-color: #4db8ff !important;
                box-shadow: 0 0 0 3px rgba(77, 184, 255, 0.1) !important;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper" x-data="{ username: '', password: '', loading: false, error: '' }">
        <div class="login-card">
            <div class="card">
                <div class="content">
                    <div class="text-center mb-4">
                        <h3>Yönetim Paneli</h3>
                    </div>
                    <form @submit.prevent="handleLogin" action="/jehat/login" method="POST" x-ref="form">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Kullanıcı Adı</label>
                                    <input type="text" class="form-control border-input" name="username" x-model="username" required autocomplete="username">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Şifre</label>
                                    <input type="password" class="form-control border-input" name="password" x-model="password" required autocomplete="current-password">
                                </div>
                            </div>
                        </div>
                        <template x-if="error">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="alert alert-danger" x-text="error"></div>
                                </div>
                            </div>
                        </template>
                        <div class="row">
                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary btn-block" :disabled="loading">
                                    <span x-show="!loading">Giriş Yap</span>
                                    <span x-show="loading">Giriş Yapılıyor...</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/assets/js/jquery-1.10.2.js" type="text/javascript"></script>
    <script src="/static/assets/js/bootstrap.min.js" type="text/javascript"></script>
    <script src="/static/js/cdn.min.js" defer></script>
    <script>
        function handleLogin() {
            this.loading = true;
            this.error = '';
            this.$refs.form.submit();
        }
    </script>
</body>

</html>
